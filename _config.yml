title: Dan Roberts
description: Data scientist, traveller, lifeguard. Building TravelNet — a 3-year personal data science project across 6 countries.
author: Dan Roberts
email: # add your email if you want it public
url: "https://danielroberts20.github.io"
baseurl: ""

github_username: danielroberts20

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Collections
collections:
  posts:
    output: true

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Dan Roberts"

# Pagination
paginate: 6
paginate_path: "/blog/page:num/"

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
